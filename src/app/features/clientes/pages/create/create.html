<lv-page-header
  title="Nuevo cliente"
  subtitle="Registra un nuevo cliente en el sistema."
  [breadcrumb]="breadcrumb()"
>
  <lv-button variant="secondary" (onClick)="onCancel()">Volver</lv-button>
</lv-page-header>

<lv-dynamic-form
  [formGroup]="form"
  [fields]="fields()"
  [loading]="loading()"
  (onSubmit)="onSubmit()"
  (onCancel)="onCancel()"
  (documentResolved)="onDocumentoResuelto($event)"
  submitLabel="Guardar"
  cancelLabel="Cancelar"
/>
