<div class="users-page">
  <lv-page-header
    title="Compañías"
    subtitle="Gestiona las compañías del sistema desde una vista centralizada."
    color="primary"
    [breadcrumb]="breadcrumb()"
  >
    <div class="permissions-header-actions">
      <lv-search-box
        placeholder="Buscar compañía..."
        [value]="searchTerm()"
        (onSearch)="onSearch($event)"
        (onClear)="clearSearch()"
      />

      <lv-button (onClick)="openCreateForm()">Nueva compañía</lv-button>
    </div>
  </lv-page-header>

  <div class="permissions-content">
    <lv-data-table
      [data]="filteredCompanias()"
      [columns]="columns"
      [loading]="loading()"
      [actions]="tableActions"
      emptyMessage="No hay compañías para mostrar con este filtro."
    />
  </div>
</div>
