<lv-page-header
  title="Marcas"
  subtitle="Gestiona las marcas del sistema desde una vista centralizada."
  color="primary"
  [breadcrumb]="breadcrumb()"
  [showSearch]="true"
  searchPlaceholder="Buscar marca..."
  [searchValue]="searchTerm()"
  (searchChange)="onSearch($event)"
  (searchClear)="clearSearch()"
>
  <lv-button (onClick)="openCreateForm()">Nueva marca</lv-button>
</lv-page-header>

  <lv-data-table
    [data]="filteredMarcas()"
    [columns]="columns"
    [loading]="loading()"
    [actions]="tableActions"
    emptyMessage="No hay marcas para mostrar con este filtro."
  />
