<lv-page-header
  title="Editar producto"
  subtitle="Actualiza los datos del producto seleccionado."
  [breadcrumb]="breadcrumb()"
>
  <lv-button
    variant="secondary"
    (onClick)="onCancel()"
  >
    Volver
  </lv-button>
</lv-page-header>

<lv-dynamic-form
  [formGroup]="form"
  [fields]="fields()"
  [loading]="loading()"
  (onSubmit)="onSubmit()"
  (onCancel)="onCancel()"
  submitLabel="Actualizar"
  cancelLabel="Cancelar"
/>
