<lv-page-header
  title="Productos"
  subtitle="Gestiona el catálogo de productos del sistema desde una vista centralizada."
  color="primary"
  [breadcrumb]="breadcrumb()"
>
  <div class="permissions-header-actions">
    <lv-search-box
      placeholder="Buscar producto..."
      [value]="searchTerm()"
      (onSearch)="onSearch($event)"
      (onClear)="clearSearch()"
    />

    <lv-button (onClick)="openCreateForm()">Nuevo producto</lv-button>
  </div>
</lv-page-header>

<div class="permissions-content">
  <lv-data-table
    [data]="filteredProductos()"
    [columns]="columns"
    [loading]="loading()"
    [actions]="tableActions"
    emptyMessage="No hay productos para mostrar con este filtro."
  />
</div>
