<lv-page-header
  title="Editar sede"
  subtitle="Actualiza los datos de la sede."
  [breadcrumb]="breadcrumb()"
>
  <lv-button
    variant="secondary"
    (onClick)="onCancel()">
    Volver
  </lv-button>
</lv-page-header>

@if (loading()) {
  <p>Cargando sede...</p>
} @else {

  <lv-dynamic-form
      [formGroup]="form"
      [fields]="fields()"
      [loading]="loading()"
      (onSubmit)="onSubmit()"
      (onCancel)="onCancel()"
      submitLabel="Actualizar"
      cancelLabel="Cancelar"
  />

}
