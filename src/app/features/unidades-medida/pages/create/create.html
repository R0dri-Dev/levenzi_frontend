<lv-page-header
  title="Nueva unidad de medida"
  subtitle="Registra una nueva unidad y su equivalencia respecto a la unidad base."
  [breadcrumb]="breadcrumb()"
>
  <lv-button variant="secondary" (onClick)="onCancel()">Volver</lv-button>
</lv-page-header>

<lv-dynamic-form
  [formGroup]="form"
  [fields]="fields()"
  [loading]="loading()"
  (onSubmit)="onSubmit()"
  (onCancel)="onCancel()"
  submitLabel="Guardar"
  cancelLabel="Cancelar"
/>
