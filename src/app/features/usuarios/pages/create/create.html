<lv-page-header
  title="Crear usuario"
  subtitle="Registra un nuevo usuario para el sistema."
  [breadcrumb]="breadcrumb()"
>
  <lv-button variant="secondary" (onClick)="onCancel()">Volver</lv-button>
</lv-page-header>

<lv-dynamic-form
  [formGroup]="form"
  [fields]="fields"
  [loading]="loading()"
  (onSubmit)="onSubmit()"
  (onCancel)="onCancel()"
  submitLabel="Guardar"
  cancelLabel="Cancelar"
/>
