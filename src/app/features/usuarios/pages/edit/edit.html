<lv-page-header
  title="Editar usuario"
  subtitle="Actualiza los datos del usuario seleccionado."
  [breadcrumb]="breadcrumb()"
>
  <lv-button variant="secondary" (onClick)="onCancel()">Volver</lv-button>
</lv-page-header>

@if (loading()) {
  <p>Cargando usuario...</p>
} @else {
  <lv-dynamic-form
    [formGroup]="form"
    [fields]="fields"
    [loading]="loading()"
    (onSubmit)="onSubmit()"
    (onCancel)="onCancel()"
    submitLabel="Actualizar"
    cancelLabel="Cancelar"
  />
}
