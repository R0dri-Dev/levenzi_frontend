<div class="users-page">
  @if (activeView() === 'list') {
    <lv-page-header
      title="Usuarios"
      subtitle="Gestiona los usuarios del sistema desde una vista centralizada."
      color="primary"
      [breadcrumb]="breadcrumb()"
    >
      <div class="permissions-header-actions">
        <lv-search-box
          placeholder="Buscar usuario..."
          [value]="searchTerm()"
          (onSearch)="onSearch($event)"
          (onClear)="clearSearch()"
        />

        <lv-button (onClick)="openCreateForm()">Nuevo usuario</lv-button>
      </div>
    </lv-page-header>

    <div class="permissions-content">
      <lv-data-table
        [data]="filteredUsers()"
        [columns]="columns"
        [loading]="loading()"
        [actions]="tableActions"
        emptyMessage="No hay usuarios para mostrar con este filtro."
      />
    </div>
  } @else if (activeView() === 'detail' && selectedUser()) {
    <lv-page-header
      title="Detalle del usuario"
      subtitle="Consulta la información registrada de este usuario."
      color="primary"
      [breadcrumb]="breadcrumb()"
    >
      <lv-button variant="secondary" (onClick)="closeForm()">Volver al listado</lv-button>
    </lv-page-header>

    <section class="permissions-card">
      <app-detail-user [usuario]="selectedUser()" (close)="closeForm()" />
    </section>
  }
</div>

<lv-modal [isOpen]="activeView() === 'create'" title="Crear usuario" size="lg" (onClose)="closeForm()">
  <app-create-user (submit)="handleCreateSubmit($event)" (cancel)="closeForm()" />
</lv-modal>

<lv-modal [isOpen]="activeView() === 'edit' && !!selectedUser()" title="Editar usuario" size="lg" (onClose)="closeForm()">
  <app-edit-user [usuario]="selectedUser()" (submit)="handleEditSubmit($event)" (cancel)="closeForm()" />
</lv-modal>
