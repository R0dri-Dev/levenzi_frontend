<div class="users-page">
  <lv-page-header
    title="Usuarios"
    subtitle="Gestiona los usuarios del sistema desde una vista centralizada."
    color="primary"
    [breadcrumb]="breadcrumb()"
  >
    <div class="permissions-header-actions">
      <lv-search-box
        placeholder="Buscar usuario..."
        [value]="searchTerm()"
        (onSearch)="onSearch($event)"
        (onClear)="clearSearch()"
      />

      <lv-button (onClick)="openCreateForm()">
        Nuevo usuario
      </lv-button>
    </div>
  </lv-page-header>

  <div class="permissions-content">
    <lv-data-table
      [data]="filteredUsers()"
      [columns]="columns"
      [loading]="loading()"
      [actions]="tableActions"
      emptyMessage="No hay usuarios para mostrar con este filtro."
    />
  </div>
</div>
