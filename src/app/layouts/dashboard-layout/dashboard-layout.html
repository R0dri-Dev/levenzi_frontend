<lv-dashboard-template layout="both" variant="default">
  <div header>
    <lv-app-navbar
      [links]="navLinks()"
      [user]="navUser()"
      (onUserAction)="handleNavbarAction($event)"
      (onMenuToggle)="onNavbarMenuToggle()" />
  </div>

  <div sidebar>
    <lv-app-sidebar
      [items]="sidebarItems()"
      header="Grobdi"
      footer="© Grobdi"
      size="md"
      [showToggle]="false"
      position="left" />
  </div>

  <router-outlet />
</lv-dashboard-template>
