<div
  class="relative inline-flex items-center justify-center overflow-hidden"
  [class]="[
    size() === 'xs' ? 'w-6 h-6 text-xs' :
    size() === 'sm' ? 'w-8 h-8 text-sm' :
    size() === 'md' ? 'w-10 h-10 text-base' :
    size() === 'lg' ? 'w-12 h-12 text-lg' :
    'w-16 h-16 text-xl',
    circle() ? 'rounded-full' : 'rounded-lg',
    bordered() ? 'ring-2 ring-white shadow' : ''
  ].join(' ')">

  @if (src()) {
    <img
      class="h-full w-full object-cover"
      [src]="src()"
      [alt]="alt()">
  } @else {
    <span class="font-medium uppercase text-slate-600">
      {{ initials() }}
    </span>
  }

  @if (status() !== 'idle') {
    <span
      class="absolute bottom-0 right-0 rounded-full border-2 border-white"
      [class]="[
        status() === 'loading' ? 'bg-blue-400 animate-pulse' :
        status() === 'success' ? 'bg-emerald-500' :
        status() === 'error' ? 'bg-red-500' :
        status() === 'warning' ? 'bg-amber-400' :
        status() === 'info' ? 'bg-sky-400' :
        'bg-gray-400',
        size() === 'xs' ? 'w-1.5 h-1.5' :
        size() === 'sm' ? 'w-2 h-2' :
        size() === 'md' ? 'w-2.5 h-2.5' :
        size() === 'lg' ? 'w-3 h-3' :
        'w-3.5 h-3.5'
      ].join(' ')">
    </span>
  }
</div>
