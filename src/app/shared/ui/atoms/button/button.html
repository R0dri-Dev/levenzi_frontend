<button
  [type]="type()"
  class="lv-button lv-button-{{ variant() }} lv-button-{{ size() }}"
  [class.lv-button-full]="fullWidth()"
  [class.lv-button-loading]="loading()"
  [disabled]="isDisabled()"
  [attr.aria-disabled]="isDisabled()"
  [attr.aria-busy]="loading()"
  (click)="handleClick($event)">

  @if (loading()) {
    <lv-icon name="spinner" size="sm" class="animate-spin" />
  }

  @if (leftIcon() && !loading()) {
    <lv-icon [name]="leftIcon()!" size="sm" />
  }

  <span>
    <ng-content />
  </span>

  @if (rightIcon() && !loading()) {
    <lv-icon [name]="rightIcon()!" size="sm" />
  }
</button>
