<section
  class="lv-card"
  [class.lv-card-hoverable]="hoverable()"
  [class.lv-card-bordered]="bordered()"
  [class.lv-card-no-shadow]="!shadow()"
  [class]="'lv-card-rounded-' + rounded()">

  @if (headerText()) {
    <div class="lv-card-header">{{ headerText() }}</div>
  }

  <div class="lv-card-body"><ng-content /></div>

  @if (footerText()) {
    <div class="lv-card-footer">{{ footerText() }}</div>
  }
</section>
