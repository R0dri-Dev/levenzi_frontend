<label class="lv-checkbox lv-checkbox-{{ variant() }} lv-checkbox-{{ size() }}">
  <input
    type="checkbox"
    class="lv-checkbox-input"
    [checked]="internalChecked()"
    [disabled]="internalDisabled()"
    (change)="handleChange($event)">
  <span class="lv-checkbox-custom"></span>
  <span class="lv-checkbox-label">
    <ng-content />
  </span>
</label>
