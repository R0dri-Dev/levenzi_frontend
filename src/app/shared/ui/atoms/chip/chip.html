<div
  class="lv-chip lv-chip-{{ variant() }} lv-chip-{{ size() }}"
  [class.lv-chip-disabled]="disabled()"
  (click)="handleClick($event)">

  <span class="lv-chip-label">{{ label() }}</span>

  @if (removable()) {
    <button
      type="button"
      class="lv-chip-remove"
      (click)="handleRemove($event)">
      ✕
    </button>
  }
</div>
