@switch(level()){

@case('1'){
<h1 [class]="classes()">
    <ng-content/>
</h1>}

@case('2'){
<h2 [class]="classes()"><ng-content/></h2>
}

@case('3'){
<h3 [class]="classes()"><ng-content/></h3>
}

@case('4'){
<h4 [class]="classes()"><ng-content/></h4>
}

@case('5'){
<h5 [class]="classes()"><ng-content/></h5>
}

@case('6'){
<h6 [class]="classes()"><ng-content/></h6>
}

}

@if(subtitle()){

<p class="mt-2 text-gray-500">

{{subtitle()}}

</p>

}
