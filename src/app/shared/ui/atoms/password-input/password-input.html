<div class="lv-password-wrapper">
  @if (label()) {
    <label class="lv-password-label">
      {{ label() }}
      @if (required()) {
        <span class="lv-password-required">*</span>
      }
    </label>
  }

  <div class="lv-password-container lv-password-{{ appearance() }} lv-password-{{ variant() }} lv-password-{{ size() }}">
    <input
      [type]="isShown() ? 'text' : 'password'"
      [name]="name()"
      [value]="value()"
      [placeholder]="placeholder()"
      [disabled]="disabled()"
      [required]="required()"
      class="lv-password-input"
      (input)="handleInput($event)"
    />

    <button
      type="button"
      class="lv-password-toggle"
      (click)="toggleVisibility()"
      [attr.aria-label]="isShown() ? 'Ocultar contraseña' : 'Mostrar contraseña'"
      tabindex="-1">
      @if (isShown()) {
        <lv-icon name="eye-off" size="sm" />
      } @else {
        <lv-icon name="eye" size="sm" />
      }
    </button>
  </div>
</div>
