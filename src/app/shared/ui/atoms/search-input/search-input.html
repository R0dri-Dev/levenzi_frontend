<div class="lv-search-input" [class]="sizeClasses.height">
  <lv-icon name="search" size="sm" class="lv-search-input-icon" />
  <input
    type="text"
    [placeholder]="placeholder()"
    [value]="value()"
    (input)="onInput($event)"
    [class]="sizeClasses.text"
    class="lv-search-input-field" />
</div>
