<div [class]="classes()">
  <!-- Left slot -->
  <div class="flex items-center gap-2 flex-wrap">
    <ng-content select="[left]"></ng-content>
  </div>

  <!-- Center slot - filters -->
  <div class="flex items-center gap-2 flex-wrap">
    <ng-content select="[filters]"></ng-content>
  </div>

  <!-- Right slot - actions -->
  <div class="flex items-center gap-2 ml-auto">
    <ng-content select="[right]"></ng-content>
  </div>
</div>
