<div
  class="lv-filter-bar lv-filter-bar-{{ appearance() }} lv-filter-bar-{{ size() }}"
  [class.lv-filter-bar-full]="fullWidth()">

  <div class="lv-filter-bar-section">
    <ng-content select="[left]"></ng-content>
  </div>

  <div class="lv-filter-bar-section lv-filter-bar-filters">
    <ng-content select="[filters]"></ng-content>
  </div>

  <div class="lv-filter-bar-section lv-filter-bar-actions">
    <ng-content select="[right]"></ng-content>
  </div>
</div>
