<div class="lv-filter-date lv-filter-date-{{ size() }}">
  @if (label()) {
    <span class="lv-filter-date-label">{{ label() }}</span>
  }

  <lv-icon name="calendar" [size]="size()" color="neutral" />

  <lv-input
    type="date"
    [size]="size()"
    value="startValue()"
    (onValueChange)="onStartChange($event)"
    [disabled]="disabled()"
    placeholder="Inicio"
  />

  <span class="lv-filter-date-separator">a</span>

  <lv-input
    type="date"
    [size]="size()"
    value="endValue()"
    (onValueChange)="onEndChange($event)"
    [disabled]="disabled()"
    placeholder="Fin"
  />

  @if (showPresets()) {
    <div class="lv-filter-date-presets">
      <lv-button size="sm" appearance="ghost" (onClick)="applyPreset('today')">Hoy</lv-button>
      <lv-button size="sm" appearance="ghost" (onClick)="applyPreset('week')">Semana</lv-button>
      <lv-button size="sm" appearance="ghost" (onClick)="applyPreset('month')">Mes</lv-button>
    </div>
  }
</div>
