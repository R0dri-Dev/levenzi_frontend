<!-- shared/ui/atoms/form-error/form-error.html -->
@if (message()) {
  <div [class]="classes().container">
    @if (showIcon() && icon()) {
      <lv-icon
        [name]="icon()"
        size="sm"
        [class]="classes().icon"
      />
    }
    <lv-paragraph [size]="size()">
      {{ message() }}
    </lv-paragraph>
  </div>
}
