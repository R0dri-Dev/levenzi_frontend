@if (message()) {
  <div class="lv-form-error lv-form-error-{{ variant() }} lv-form-error-{{ size() }}">
    @if (showIcon()) {
      <lv-icon [name]="icon()" size="sm" class="lv-form-error-icon" />
    }
    <lv-paragraph [size]="size()" class="lv-form-error-text">
      {{ message() }}
    </lv-paragraph>
  </div>
}
