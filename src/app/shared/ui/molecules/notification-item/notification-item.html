<div
  [class]="classes().container"
  (click)="handleClick()"
  role="alert"
>
  <div [class]="classes().icon">
    <lv-icon [name]="getIconName()" size="sm" />
  </div>

  <div class="flex-1 min-w-0">
    <div class="flex items-center justify-between gap-2">
      <h4 [class]="classes().title">{{ title() }}</h4>
      @if (closable()) {
       <lv-icon-button
        icon="x"
        label="Dismiss notification"
        size="sm"
        variant="ghost"
        (click)="dismiss()"
      />
      }
    </div>
    <p [class]="classes().message">{{ message() }}</p>
    @if (time()) {
      <time [class]="classes().time">{{ time() }}</time>
    }
  </div>
</div>
