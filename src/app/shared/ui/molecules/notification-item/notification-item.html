<div
  class="lv-notification lv-notification-{{ variant() }} lv-notification-{{ size() }}"
  (click)="handleClick()"
  role="alert">

  <div class="lv-notification-icon">
    <lv-icon name="info" size="sm" />
  </div>

  <div class="lv-notification-content">
    <div class="lv-notification-header">
      <lv-heading
        level="5"
        [text]="title()"
        color="neutral"
        weight="semibold" />

      @if (closable()) {
        <lv-icon-button
          icon="x"
          label="Dismiss notification"
          size="sm"
          variant="ghost"
          (onClick)="dismiss()" />
      }
    </div>

    <lv-paragraph
      size="sm"
      color="neutral">
      {{ message() }}
    </lv-paragraph>

    @if (time()) {
      <lv-paragraph
        size="xs"
        color="neutral"
        [muted]="true">
        {{ time() }}
      </lv-paragraph>
    }
  </div>
</div>
