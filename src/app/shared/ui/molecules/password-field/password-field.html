<div [class]="classes().container">
  @if (label()) {
    <lv-label [text]="label()" [required]="required()" />
  }

  <div [class]="classes().field">
    <lv-input
      [type]="inputType"
      [placeholder]="placeholder()"
      [disabled]="disabled()"
      [value]="internalValue()"
      [required]="required()"
      [minlength]="minLength()"
      [size]="size()"
      (onValueChange)="onInputChange($event)"
      aria-label="Contraseña"
    />

    <lv-icon-button
      [icon]="showPassword() ? 'eyeOff' : 'eye'"
      label="Mostrar u ocultar contraseña"
      [size]="size()"
      variant="ghost"
      [disabled]="disabled()"
      (onClick)="togglePasswordVisibility()"
      [class]="classes().toggle"
    />
  </div>

  @if (showStrength() && internalValue()) {
    <div class="space-y-1">
      <div [class]="classes().strengthBar">
        <div
          [class]="getStrengthFill()"
          class="h-full rounded-full transition-all duration-300"
        ></div>
      </div>
      <div class="flex justify-between text-xs">
        <span [class]="getStrengthTextClass()">
          {{ getStrengthLabel() }}
        </span>
        <span class="text-gray-400">
          {{ internalValue().length }}/{{ minLength() }} caracteres
        </span>
      </div>
    </div>
  }

  @if (hint() && !error()) {
    <p [class]="classes().hint">{{ hint() }}</p>
  }

  @if (error()) {
    <lv-form-error [message]="error()" />
  }
</div>
