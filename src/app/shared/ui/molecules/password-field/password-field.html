<div class="lv-password-field">
  @if (label()) {
    <lv-label [text]="label()" [required]="required()" />
  }

  <div class="lv-password-field-wrapper lv-password-field-{{ color() }} lv-password-field-{{ size() }}">
    <lv-input
      [type]="inputType"
      [placeholder]="placeholder()"
      [disabled]="disabled()"
      [value]="internalValue()"
      [required]="required()"
      [minlength]="minLength()"
      [size]="size()"
      [variant]="color()"
      (onValueChange)="onInputChange($event)"
    />

    <button
      type="button"
      class="lv-password-field-toggle"
      (click)="togglePasswordVisibility()"
      [disabled]="disabled()"
      [attr.aria-label]="showPassword() ? 'Ocultar contraseña' : 'Mostrar contraseña'">
      <lv-icon [name]="showPassword() ? 'eye-off' : 'eye'" size="sm" />
    </button>
  </div>

  @if (showStrength() && internalValue()) {
    <div class="lv-password-strength">
      <div class="lv-password-strength-bar">
        <div
          class="lv-password-strength-fill lv-password-strength-{{ getStrength() }}"
          [style.width.%]="getStrength() === 'weak' ? 25 : getStrength() === 'medium' ? 50 : getStrength() === 'strong' ? 75 : 100">
        </div>
      </div>
      <div class="lv-password-strength-info">
        <span class="lv-password-strength-label lv-password-strength-{{ getStrength() }}">
          {{ getStrengthLabel() }}
        </span>
        <span class="lv-password-strength-count">
          {{ internalValue().length }}/{{ minLength() }}
        </span>
      </div>
    </div>
  }

  @if (hint() && !error()) {
    <lv-paragraph size="sm" color="neutral" [muted]="true">
      {{ hint() }}
    </lv-paragraph>
  }

  @if (error()) {
    <lv-form-error [message]="error()" />
  }
</div>
