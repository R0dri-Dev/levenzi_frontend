<div class="lv-remember-me lv-remember-me-{{ size() }}">
  <lv-checkbox
    [checked]="internalChecked()"
    [disabled]="disabled()"
    [size]="size()"
    [variant]="color()"
    (onChange)="toggle($event)" />

  <lv-label
    [text]="label()"
    [size]="size()"
    [color]="color()"
    [disabled]="disabled()" />
</div>
