<div class="lv-search-box lv-search-box-{{ size() }}">
  <lv-icon name="search" class="lv-search-box-icon" />

  <lv-input
    #input
    type="text"
    [placeholder]="placeholder()"
    [disabled]="disabled()"
    [value]="searchValue()"
    [size]="size()"
    [variant]="color()"
    (onValueChange)="onInputChange($event)"
    (onFocus)="onFocus.emit()"
    (onBlur)="onBlur.emit()"
    [attr.aria-label]="placeholder()"
  />

  @if (searchValue()) {
    <lv-icon-button
      icon="x"
      label="Limpiar búsqueda"
      [size]="size()"
      variant="ghost"
      [disabled]="disabled()"
      (onClick)="clearSearch()"
      class="lv-search-box-clear" />
  }
</div>
