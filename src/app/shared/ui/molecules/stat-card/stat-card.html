<div class="lv-stat-card lv-stat-card-{{ size() }} lv-stat-card-{{ color() }}">
  <div class="lv-stat-card-header">
    <div class="lv-stat-card-content">
      <lv-paragraph size="sm" color="neutral" [muted]="true">
        {{ title() }}
      </lv-paragraph>

      <lv-heading level="4" color="neutral">
        {{ value() }}
      </lv-heading>

      @if (trend() && trendValue()) {
        <span class="lv-stat-card-trend lv-stat-card-trend-{{ trend() }}">
          <lv-icon [name]="trend() === 'up' ? 'arrow-up' : trend() === 'down' ? 'arrow-down' : 'minus'" size="xs" />
          {{ trendValue() }}
        </span>
      }
    </div>

    @if (icon()) {
      <div class="lv-stat-card-icon lv-stat-card-icon-{{ color() }}">
        <lv-icon [name]="icon()!" size="lg" />
      </div>
    }
  </div>

  @if (description()) {
    <lv-paragraph size="sm" color="neutral" [muted]="true" class="lv-stat-card-description">
      {{ description() }}
    </lv-paragraph>
  }
</div>
