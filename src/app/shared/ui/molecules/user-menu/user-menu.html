<lv-button
  variant="secondary"
  appearance="ghost"
  size="sm"
  class="lv-user-menu-trigger"
  (onClick)="toggle()"
  [attr.aria-expanded]="isOpen()"
  aria-haspopup="true">

  <div class="lv-user-menu-trigger-content">
    @if (showAvatar()) {
      <lv-avatar
        [src]="user().avatar || ''"
        [initials]="user().initials || ''"
        [alt]="user().name"
        size="sm" />
    }

    @if (showUserInfo()) {
      <div class="lv-user-menu-info">
        <lv-paragraph size="sm" weight="semibold" color="neutral">
          {{ user().name }}
        </lv-paragraph>
        <lv-paragraph size="xs" color="neutral" [muted]="true">
          {{ user().email }}
        </lv-paragraph>
      </div>
    }

    <lv-icon name="chevron-down" size="sm" class="lv-user-menu-chevron" />
  </div>
</lv-button>
