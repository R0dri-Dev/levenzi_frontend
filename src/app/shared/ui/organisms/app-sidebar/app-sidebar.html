<aside
  class="lv-app-sidebar lv-app-sidebar-{{ position() }} lv-app-sidebar-{{ size() }}"
  [class.lv-app-sidebar-collapsed]="isCollapsedMode()"
  role="navigation">

  @if (showToggle()) {
    <div class="lv-app-sidebar-toggle">
      <lv-icon-button
        [icon]="isCollapsed() ? 'chevron-right' : 'chevron-left'"
        label="Colapsar sidebar"
        variant="ghost"
        size="sm"
        (onClick)="toggleSidebar()" />
    </div>
  }

  @if (header()) {
    <div class="lv-app-sidebar-header">
      <lv-paragraph size="sm" weight="semibold" color="neutral">
        {{ header() }}
      </lv-paragraph>
    </div>
  }

  <nav class="lv-app-sidebar-nav">
    @for (item of items(); track $index) {
      @if (item.divider) {
        <lv-divider />
      } @else {
        @if (item.route) {
          <a
            [routerLink]="item.route"
            class="lv-app-sidebar-item"
            [class.lv-app-sidebar-item-active]="isActive(item)"
            (click)="handleItemClick(item)"
            [attr.aria-current]="isActive(item) ? 'page' : null">

            @if (item.icon) {
              <lv-icon [name]="item.icon" class="lv-app-sidebar-icon" />
            }

            @if (!isCollapsedMode()) {
              <span class="lv-app-sidebar-label">
                {{ item.label }}
              </span>
              @if (item.badge) {
                <lv-badge [variant]="item.badgeColor || 'primary'">
                  {{ item.badge }}
                </lv-badge>
              }
            }
          </a>
        } @else {
          <button
            class="lv-app-sidebar-item"
            [class.lv-app-sidebar-item-active]="isActive(item)"
            (click)="handleItemClick(item)">

            @if (item.icon) {
              <lv-icon [name]="item.icon" class="lv-app-sidebar-icon" />
            }

            @if (!isCollapsedMode()) {
              <span class="lv-app-sidebar-label">{{ item.label }}</span>
              @if (item.badge) {
                <lv-badge [variant]="item.badgeColor || 'primary'">
                  {{ item.badge }}
                </lv-badge>
              }
            }
          </button>
        }
      }
    }
  </nav>

  @if (footer()) {
    <div class="lv-app-sidebar-footer">
      <lv-paragraph size="sm" color="neutral" [muted]="true">
        {{ footer() }}
      </lv-paragraph>
    </div>
  }
</aside>
