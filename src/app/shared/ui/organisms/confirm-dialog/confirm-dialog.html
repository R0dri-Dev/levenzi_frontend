@if (isOpen()) {
  <div class="lv-confirm-overlay" role="dialog" aria-modal="true">
    <div class="lv-confirm-dialog lv-confirm-dialog-{{ size() }}">
      <div class="lv-confirm-content">
        <div class="lv-confirm-icon lv-confirm-icon-{{ variant() }}">
          <lv-icon name="x" size="lg" />
        </div>

        <lv-heading level="3" color="neutral" align="center">
          {{ title() }}
        </lv-heading>

        <lv-paragraph color="neutral" align="center">
          {{ message() }}
        </lv-paragraph>

        <div class="lv-confirm-actions">
          <lv-button
            variant="secondary"
            (onClick)="handleCancel()">
            {{ cancelLabel() }}
          </lv-button>
          <lv-button
            [variant]="variant()"
            [loading]="confirmLoading()"
            (onClick)="handleConfirm()">
            {{ confirmLabel() }}
          </lv-button>
        </div>
      </div>
    </div>
  </div>
}
