<div
  class="lv-page-filter lv-page-filter-{{ appearance() }} lv-page-filter-{{ size() }}"
  [class.lv-page-filter-full]="fullWidth()">

  <div class="lv-page-filter-left">
    <ng-content select="[left]"></ng-content>
  </div>

  <div class="lv-page-filter-filters">
    <ng-content select="[filters]"></ng-content>
  </div>

  <div class="lv-page-filter-right">
    <ng-content select="[right]"></ng-content>
  </div>
</div>
