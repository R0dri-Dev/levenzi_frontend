@if (isOpen()) {
  <div
    #overlay
    class="lv-drawer-overlay"
    (click)="handleOverlayClick($event)"
    role="dialog"
    aria-modal="true">

    <div
      #drawer
      class="lv-drawer lv-drawer-{{ position() }} lv-drawer-{{ size() }} lv-drawer-{{ color() }}">

      <div class="lv-drawer-header">
        <lv-heading level="4" color="neutral">
          {{ title() }}
        </lv-heading>
        <lv-icon-button
          icon="x"
          label="Cerrar drawer"
          variant="ghost"
          size="sm"
          (onClick)="handleCloseClick()" />
      </div>

      <div class="lv-drawer-body">
        <ng-content></ng-content>
      </div>

      <div class="lv-drawer-footer">
        <ng-content select="[footer]"></ng-content>
      </div>
    </div>
  </div>
}
