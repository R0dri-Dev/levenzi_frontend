<form class="lv-dynamic-form" [formGroup]="formGroup()" (ngSubmit)="onSubmit.emit()">
  <div class="lv-dynamic-form-grid" [style.gridTemplateColumns]="'repeat(' + columns() + ', minmax(0, 1fr))'">
    @for(field of fields(); track field.key) {
      @if(field.type === 'location') {
        <div style="grid-column: 1 / -1;">
          <lv-location-select [formControlName]="field.key" />
        </div>
        }@else if (field.type === 'document') {
        <div style="grid-column: 1 / -1;">
          <lv-document-field [tipoControl]="asFormControl(field.key)" [numeroControl]="asFormControl(field.numeroKey!)"
            [tipoOptions]="field.options ?? []" [tipoLabel]="field.label"
            [numeroLabel]="field.numeroLabel ?? 'Número de documento'"
            [numeroPlaceholder]="field.numeroPlaceholder ?? ''" [required]="!!field.required"
            [enableLookup]="!!field.lookup" (resolved)="handleDocumentResolved(field.key, $event)" />
        </div>
        } @else if (field.type === 'phone') {
        <div style="grid-column: 1 / -1;">
          <lv-phone-field [paisControl]="asFormControl(field.key)" [numeroControl]="asFormControl(field.numeroKey!)"
            [paises]="field.paisesData ?? []" [label]="field.label" [numeroPlaceholder]="field.numeroPlaceholder ?? ''"
            [required]="!!field.required" />
        </div>
        } @else if (field.type === 'conversion') {
        <div style="grid-column: 1 / -1;">
          <lv-conversion-field [valueControl]="asFormControl(field.key)" [baseLabel]="field.baseLabel ?? ''"
            [unitSymbol]="field.unitSymbol ?? ''" [label]="field.label" [required]="!!field.required"
            [disabled]="!!field.disabled" />
        </div>
        } @else {
        <lv-form-field [label]="field.label" [required]="!!field.required" [error]="errorFor(field.key)"
          [hint]="field.hint ?? ''">
          @switch(field.type) {
            @case('checkbox') {
            <lv-checkbox [formControlName]="field.key" />
            }
            @case('select') {
            <lv-select [formControlName]="field.key" [options]="field.options ?? []"
              [placeholder]="field.placeholder ?? ''" [required]="!!field.required" />
            }
            @default{
            <lv-input [formControlName]="field.key" [type]="field.type" [placeholder]="field.placeholder ?? ''"
              [required]="!!field.required" />
            }
            }
        </lv-form-field>
        }
        }
  </div>
  <div class="lv-dynamic-form-footer-bar">
    <lv-button-group orientation="row" [actions]="[
        { key:'cancel', label:cancelLabel(), variant:'secondary', type:'button', disabled:loading() },
        { key:'submit', label:submitLabel(), variant:'primary', type:'submit', disabled:loading(), loading:loading() }
      ]" (onAction)="handleFooterAction($event)" />
  </div>
</form>
