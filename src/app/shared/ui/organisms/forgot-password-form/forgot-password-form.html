<div class="w-full max-w-md mx-auto">
  <div class="bg-white rounded-2xl shadow-xl p-8">
    <!-- Header -->
    <div class="text-center mb-8">
      <h2 class="text-2xl font-bold text-gray-900">
        Recuperar Contraseña
      </h2>
      <p class="text-sm text-gray-500 mt-1">
        Te enviaremos un enlace para restablecer tu contraseña
      </p>
    </div>

    <!-- Success -->
    @if (success()) {
      <div class="mb-4 p-4 bg-green-50 text-green-700  rounded-xl text-center">
        <p>¡Te hemos enviado un enlace a tu correo electrónico!</p>
        <button
          type="button"
          (click)="handleBackToLogin()"
          class="mt-2 text-blue-600 hover:text-blue-700  bg-transparent border-0 cursor-pointer"
        >
          Volver al inicio de sesión
        </button>
      </div>
    } @else {
      <!-- Error -->
      @if (error()) {
        <lv-form-error [message]="error()!" class="mb-4" />
      }

      <!-- Form -->
      <form (ngSubmit)="handleSubmit()" class="space-y-4">
        <!-- Email -->
        <lv-input
          type="email"
          placeholder="Correo electrónico"
          [value]="email()"
          (onValueChange)="email.set($event)"
          icon="mail"
          [required]="true"
        />

        <!-- Submit -->
        <lv-button
          type="submit"
          variant="primary"
          [loading]="loading()"
          [fullWidth]="true"
          [disabled]="!email()"
          size="lg"
        >
          Enviar enlace
        </lv-button>

        <!-- Back to Login -->
        <div class="text-center mt-4">
          <button
            type="button"
            (click)="handleBackToLogin()"
            class="text-sm text-gray-500 hover:text-gray-700 transition-colors duration-200 bg-transparent border-0 cursor-pointer"
          >
            ← Volver al inicio de sesión
          </button>
        </div>
      </form>
    }
  </div>
</div>
