<div
  [class]="'flex flex-col items-center justify-center gap-4'"
  [class]="fullScreen() ? 'fixed inset-0 bg-white dark:bg-gray-900 z-50' : 'min-h-50'"
>
  <div class="relative">
    <!-- Spinner -->
    <div class="w-12 h-12 border-4 border-gray-200 dark:border-gray-700 border-t-blue-600 dark:border-t-blue-400 rounded-full animate-spin"></div>
  </div>

  @if (message()) {
    <p class="text-gray-500 dark:text-gray-400 text-sm">{{ message() }}</p>
  }
</div>
