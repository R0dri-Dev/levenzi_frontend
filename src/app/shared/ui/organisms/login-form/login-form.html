<div [class]="'w-full max-w-md mx-auto'">
  <div [class]="'bg-white dark:bg-gray-800 rounded-2xl shadow-xl p-8'">
    <!-- Header -->
    <div [class]="'text-center mb-8'">
      <h2 [class]="'text-2xl font-bold text-gray-900 dark:text-white'">
        Iniciar Sesión
      </h2>
      <p [class]="'text-sm text-gray-500 dark:text-gray-400 mt-1'">
        Ingresa tus credenciales para acceder
      </p>
    </div>

    <!-- Error -->
    @if (error()) {
      <lv-form-error [message]="error()!" class="mb-4" />
    }

    <!-- Form -->
    <form (ngSubmit)="handleSubmit()" [class]="'space-y-4'">
      <!-- Email -->
      <lv-input
        type="email"
        placeholder="Correo electrónico"
        [value]="formData().email"
        (onValueChange)="updateEmail($event)"
        icon="mail"
        required
      />

      <!-- Password -->
      <lv-password-field
        placeholder="Contraseña"
        [value]="formData().password"
        (onValueChange)="updatePassword($event)"
        required
      />

      <!-- Remember Me & Forgot Password -->
      <div class="flex items-center justify-between">
        <lv-remember-me
          [checked]="formData().rememberMe"
          (onToggle)="updateRememberMe($event)"
        />
        <button
          type="button"
          (click)="handleForgotPassword()"
          class="text-sm text-blue-600 hover:text-blue-700 dark:text-blue-400 dark:hover:text-blue-300 transition-colors duration-200 bg-transparent border-0 cursor-pointer"
        >
          ¿Olvidaste tu contraseña?
        </button>
      </div>

      <!-- Submit -->
      <lv-button
        type="submit"
        variant="primary"
        [loading]="loading()"
        [fullWidth]="true"
        size="lg"
      >
        Iniciar Sesión
      </lv-button>

      <!-- Register -->
      <div [class]="'text-center mt-4'">
        <span class="text-sm text-gray-500 dark:text-gray-400">
          ¿No tienes cuenta?
          <button
            type="button"
            (click)="handleRegister()"
            class="text-blue-600 hover:text-blue-700 dark:text-blue-400 dark:hover:text-blue-300 transition-colors duration-200 bg-transparent border-0 cursor-pointer font-medium"
          >
            Regístrate
          </button>
        </span>
      </div>
    </form>
  </div>
</div>
