<div class="lv-login-form">
  <div class="lv-login-card">
    <div class="lv-login-header">
      <lv-heading level="2" text="Iniciar Sesión" align="center" color="primary" />
      <lv-paragraph size="md" color="neutral" align="center" [muted]="true">
        Ingresa tus credenciales para acceder
      </lv-paragraph>
    </div>

    @if (error()) {
      <lv-form-error [message]="error()!" />
    }

    <form (ngSubmit)="handleSubmit()" class="lv-login-fields">
      <lv-input
        type="email"
        placeholder="Correo electrónico"
        (onValueChange)="updateEmail($event)"
        icon="mail"
        [required]="true"
        [size]="'lg'" />

      <lv-password-field
        placeholder="Contraseña"

        (onValueChange)="updatePassword($event)"
        [required]="true"
        [size]="'lg'" />

      <div class="lv-login-actions">
        <lv-remember-me
          [checked]="formData().rememberMe"
          (onToggle)="updateRememberMe($event)"
          [size]="'sm'" />

        <lv-link
          color="primary"
          [underline]="true"
          (click)="handleForgotPassword()">
          ¿Olvidaste tu contraseña?
        </lv-link>
      </div>

      <lv-button
        type="submit"
        variant="primary"
        [loading]="loading()"
        [fullWidth]="true"
        size="lg">
        Iniciar Sesión
      </lv-button>

      <div class="lv-login-extra">
        <lv-paragraph size="sm" color="neutral" align="center" [muted]="true">
          ¿No tienes cuenta?
          <lv-link
            color="primary"
            [underline]="true"
            (click)="handleRegister()">
            Regístrate
          </lv-link>
        </lv-paragraph>
      </div>
    </form>
  </div>
</div>
