<div [class]="LV_LOGIN_FORM_BASE">
  <div [class]="LV_LOGIN_FORM_CARD">
    <!-- Header -->
    <div [class]="LV_LOGIN_FORM_HEADER">
      <lv-heading [level]="'2'" [text]="'Iniciar Sesión'" [align]="'center'" />
      <lv-paragraph size="md" color="gray" [align]="'center'">
        Ingresa tus credenciales para acceder
      </lv-paragraph>
    </div>

    <!-- Error -->
    @if (error()) {
      <lv-form-error [message]="error()!" class="mb-4" />
    }

    <!-- Form -->
    <form (ngSubmit)="handleSubmit()" [class]="LV_LOGIN_FORM_FIELDS">
      <!-- Email -->
      <lv-input
        type="email"
        placeholder="Correo electrónico"
        [value]="formData().email"
        (onValueChange)="updateEmail($event)"
        icon="mail"
        [required]="true"
      />

      <!-- Password -->
      <lv-password-field
        placeholder="Contraseña"
        [value]="formData().password"
        (onValueChange)="updatePassword($event)"
        [required]="true"
      />

      <!-- Remember Me & Forgot Password -->
      <div [class]="LV_LOGIN_FORM_ACTIONS">
        <lv-remember-me
          [checked]="formData().rememberMe"
          (onToggle)="updateRememberMe($event)"
        />
        <button
          type="button"
          (click)="handleForgotPassword()"
          [class]="LV_LOGIN_FORM_FORGOT_PASSWORD"
        >
          ¿Olvidaste tu contraseña?
        </button>
      </div>

      <!-- Submit -->
      <lv-button
        type="submit"
        variant="primary"
        [loading]="loading()"
        [fullWidth]="true"
        size="lg"
      >
        Iniciar Sesión
      </lv-button>

      <!-- Register -->
      <div [class]="LV_LOGIN_FORM_EXTRA">
        <lv-paragraph size="sm" color="gray" [align]="'center'">
          ¿No tienes cuenta?
          <button
            type="button"
            (click)="handleRegister()"
            [class]="LV_LOGIN_FORM_REGISTER_LINK"
          >
            Regístrate
          </button>
        </lv-paragraph>
      </div>
    </form>
  </div>
</div>
