<section class="lv-page-header-filter">
  <lv-page-header
    [title]="title()"
    [subtitle]="subtitle()"
    [align]="align()"
    [color]="color()"
    [icon]="icon()"
    [breadcrumb]="breadcrumb()">
    <ng-content select="[header-actions]"></ng-content>
  </lv-page-header>

  <lv-filter-bar
    [appearance]="filterAppearance()"
    [size]="filterSize()"
    [fullWidth]="filterFullWidth()">
    <ng-content select="[left]"></ng-content>
    <ng-content select="[filters]"></ng-content>
    <ng-content select="[right]"></ng-content>
  </lv-filter-bar>
</section>
