<div class="w-full max-w-md mx-auto">
  <div class="bg-white rounded-2xl shadow-xl p-8">
    <!-- Header -->
    <div class="text-center mb-8">
      <h2 class="text-2xl font-bold text-gray-900">
        Crear Cuenta
      </h2>
      <p class="text-sm text-gray-500 mt-1">
        Regístrate para comenzar
      </p>
    </div>

    <!-- Error -->
    @if (error()) {
      <lv-form-error [message]="error()!" class="mb-4" />
    }

    <!-- Form -->
    <form (ngSubmit)="handleSubmit()" class="space-y-4">
      <!-- Name -->
      <lv-input
        type="text"
        placeholder="Nombre completo"
        [value]="formData().name"
        (onValueChange)="updateField('name', $event)"
        icon="user"
        [required]="true"
      />

      <!-- Email -->
      <lv-input
        type="email"
        placeholder="Correo electrónico"
        [value]="formData().email"
        (onValueChange)="updateField('email', $event)"
        icon="mail"
        [required]="true"
      />

      <!-- Password -->
      <lv-password-field
        placeholder="Contraseña"
        [value]="formData().password"
        (onValueChange)="updateField('password', $event)"
        [showStrength]="true"
        [required]="true"
      />

      <!-- Confirm Password -->
      <lv-password-field
        placeholder="Confirmar contraseña"
        [value]="formData().confirmPassword"
        (onValueChange)="updateField('confirmPassword', $event)"
        [required]="true"
      />

      <!-- Password Match Error -->
      @if (formData().confirmPassword && !passwordsMatch()) {
        <lv-form-error message="Las contraseñas no coinciden" />
      }

      <!-- Terms -->
      <lv-checkbox
        [checked]="formData().acceptTerms"
        (onChange)="updateField('acceptTerms', $event)"
      >
        Acepto los <a href="#" class="text-blue-600 no-underline">términos y condiciones</a>
      </lv-checkbox>

      <!-- Submit -->
      <lv-button
        type="submit"
        variant="primary"
        [loading]="loading()"
        [fullWidth]="true"
        [disabled]="!isFormValid()"
        size="lg"
      >
        Registrarse
      </lv-button>

      <!-- Login -->
      <div class="text-center mt-4">
        <span class="text-sm text-gray-500 ">
          ¿Ya tienes cuenta?
          <button
            type="button"
            (click)="handleLogin()"
            class="text-blue-600 hover:text-blue-700  transition-colors duration-200 bg-transparent border-0 cursor-pointer font-medium"
          >
            Inicia Sesión
          </button>
        </span>
      </div>
    </form>
  </div>
</div>
