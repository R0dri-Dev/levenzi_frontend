<div class="lv-stats-panel lv-stats-panel-{{ columns() }}">
  @for (stat of stats(); track $index) {
    <lv-stat-card
      [title]="stat.title"
      [value]="stat.value"
      [icon]="stat.icon"
      [color]="stat.variant || 'primary'"
      [trend]="stat.trend"
      [trendValue]="stat.trendValue"
      [description]="stat.description" />
  }
</div>
