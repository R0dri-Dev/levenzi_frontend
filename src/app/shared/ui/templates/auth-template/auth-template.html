@if (variant() === 'split') {
  <div class="lv-auth-split">
    <div class="lv-auth-split-left">
      <div class="lv-auth-split-content">
        <lv-logo
          [text]="logo()"
          size="lg"
          [showIcon]="true"
          [link]="logoUrl()"
          color="primary" />

        <lv-paragraph
          size="lg"
          color="neutral"
          align="center"
          class="lv-auth-split-subtitle">
          {{ subtitle() || 'Bienvenido a la plataforma' }}
        </lv-paragraph>

        @if (backgroundImage()) {
          <div class="lv-auth-split-image">
            <img [src]="backgroundImage()" alt="Background" />
          </div>
        }
      </div>
    </div>

    <div class="lv-auth-split-right">
      <div class="lv-auth-split-card">
        <lv-card [shadow]="true">
          <div class="lv-auth-split-form">
            <ng-content></ng-content>
          </div>
        </lv-card>
      </div>
    </div>
  </div>
} @else {
  <div class="lv-auth-centered lv-auth-centered-{{ size() }}">
    <div class="lv-auth-centered-container">
      <lv-card [shadow]="true" class="lv-auth-centered-card">
        <div class="lv-auth-centered-content">
          @if (showBranding() && logo()) {
            <div class="lv-auth-centered-logo">
              <lv-logo
                [text]="logo()"
                size="lg"
                [showIcon]="true"
                [link]="logoUrl()"
                [color]="color()" />
            </div>
          }

          @if (title() || subtitle()) {
            <div class="lv-auth-centered-header">
              @if (title()) {
                <lv-heading
                  level="2"
                  [text]="title()"
                  [color]="color()"
                  [textAlign]="align()" />
              }
              @if (subtitle()) {
                <lv-paragraph
                  size="md"
                  color="neutral"
                  [align]="align()"
                  [muted]="true">
                  {{ subtitle() }}
                </lv-paragraph>
              }
            </div>
          }

          <ng-content></ng-content>
        </div>
      </lv-card>
    </div>
  </div>
}
