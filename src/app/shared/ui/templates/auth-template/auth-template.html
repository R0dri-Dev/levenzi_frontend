<!-- Variant: Split -->
@if (variant() === 'split') {
  <div [class]="LV_AUTH_TEMPLATE_SPLIT">
    <!-- Left Panel -->
    <div [class]="LV_AUTH_TEMPLATE_SPLIT_LEFT">
      <div class="text-center">
        <lv-logo
          [text]="logo() || 'Levenzi'"
          size="lg"
          [showIcon]="true"
          class="mb-4"
          color="white"
        />

        <lv-paragraph size="lg" color="white" [align]="'center'" class="opacity-90 max-w-sm mx-auto">
          {{ subtitle() || 'Bienvenido a la plataforma' }}
        </lv-paragraph>

        @if (backgroundImage()) {
          <div class="mt-8">
            <lv-card variant="elevated" class="max-w-md mx-auto overflow-hidden">
              <img
                [src]="backgroundImage()"
                alt="Background"
                class="w-full h-auto rounded-xl"
              />
            </lv-card>
          </div>
        }
      </div>
    </div>

    <!-- Right Panel -->
    <div [class]="LV_AUTH_TEMPLATE_SPLIT_RIGHT">
      <div [class]="classes().container">
        <div [class]="classes().card">
          <div class="p-8">
            <ng-content></ng-content>
          </div>
        </div>
      </div>
    </div>
  </div>
} @else {
  <div [class]="classes().template">
    <div [class]="classes().container">
      <div class="flex items-center justify-center">
        <div class="p-6 sm:p-8" [class]="classes().card">
          <div class="w-full">
            @if (showBranding() && logo()) {
              <div [class]="LV_AUTH_TEMPLATE_LOGO">
                <lv-logo
                  [text]="logo()"
                  size="lg"
                  [showIcon]="true"
                  [link]="logoUrl()"
                  color="gray"
                />
              </div>
            }

            @if (title() || subtitle()) {
              <div [class]="LV_AUTH_TEMPLATE_HEADER">
                @if (title()) {
                  <lv-heading
                    [level]="'2'"
                    [text]="title()"
                    [align]="'center'"
                  />
                }
                @if (subtitle()) {
                  <lv-paragraph
                    size="md"
                    color="gray"
                    [align]="'center'"
                  >
                    {{ subtitle() }}
                  </lv-paragraph>
                }
              </div>
            }

            <ng-content></ng-content>
          </div>
        </div>
      </div>
    </div>
  </div>
}
